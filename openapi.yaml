        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        reasoningEffort:
          type: string
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SettingsReasoningEffort'
        status:
          type: string
          enum: [offline, online]
        concurrency:
          type: integer
          minimum: 1
        owner: { type: string, minLength: 1 }
        createdAt: { type: string, minLength: 1 }
        updatedAt: { type: string, minLength: 1 }
        skills:
          type: array
          items:
            type: string
            minLength: 1
        recentWork:
          type: array
          items:
            type: string
            minLength: 1
        activity:
          type: array
          items:
            type: string
            minLength: 1
