openapi: 3.0.3
info:
  title: devos.ing Server API
  version: 0.1.0
  description: |
    The devos.ing Server API powers the local operator UI and workflow control
    plane. Use it to inspect workspace state, manage project/task board records,
    coordinate chat-driven workflow runs, configure model and GitHub settings,
    and observe worker/poller health.

    The API is served by the local Express server at `http://localhost:3001`;
    the web app proxies `/api/*`, `/api-docs`, `/openapi`, and `/openapi.yaml`
    through `http://localhost:3000` during development.
servers:
  - url: http://localhost:3001
    description: Local Express server
  - url: http://localhost:3000
    description: Local web app proxy
tags:
  - name: Health
    description: Liveness endpoints for checking whether the local API process is running.
  - name: CLI
    description: Local CLI execution, workflow worker registration, and operator command state.
  - name: GitHub
    description: GitHub connection, OAuth/device authentication, and repository discovery.
  - name: Read Models
    description: Read-side records used by the operator UI for dashboards and history views.
  - name: Board
    description: Project and task board records that route work through devos.ing.
  - name: Chat
    description: Chat sessions, messages, and workflow send/status operations.
  - name: Settings
    description: Operator-managed model, reasoning, commit, and pull request instructions.
  - name: Notifications
    description: Internal and email notification requests emitted by workflow operations.
  - name: Polling
    description: Poller health and recent events for background task intake.
  - name: Workspace
    description: Current workspace identity and local environment readiness.
  - name: Docs
    description: Generated route documentation consumed by the operator UI.
paths:
  /health:
    get:
      tags: [Health]
      summary: Check server health
      description: Confirms that the local Express API process is accepting requests.
      responses:
        '200':
          description: Server health.
  /api/cli/history:
    get:
      tags: [CLI]
      summary: List CLI execution history
      description: Returns the in-memory command history captured by the server process for the current runtime.
      responses:
        '200':
          description: In-memory CLI execution history.
  /api/github/repositories/search:
    get:
      tags: [GitHub]
      summary: Search GitHub repositories
      description: Searches repositories visible to the configured GitHub integration using the required query string.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: GitHub repository search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubRepositorySearchResponse'
        '400':
          $ref: '#/components/responses/TypedError'
        '429':
          $ref: '#/components/responses/TypedError'
        '502':
          $ref: '#/components/responses/TypedError'
        '503':
          $ref: '#/components/responses/TypedError'
  /api/computers:
    get:
      tags: [CLI]
      summary: List registered workflow workers
      description: Returns computers that have connected as workflow workers and can receive workflow commands.
      responses:
        '200':
          description: Registered workflow worker computers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegisteredComputerRecord'
  /api/token-usage:
    get:
      tags: [Read Models]
      summary: List token usage records
      description: Reads token usage rows for dashboard and reporting views.
      responses:
        '200':
          description: Token usage rows.
  /api/jobs:
    get:
      tags: [Read Models]
      summary: List job records
      description: Reads job rows for operator status and history views.
      responses:
        '200':
          description: Job rows.
  /api/docs/routes:
    get:
      tags: [Docs]
      summary: List generated route documentation
      description: Returns the server route metadata used by the operator UI and generated Markdown API reference.
      responses:
        '200':
          description: Generated API route documentation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDocsResponse'
  /api/projects:
    get:
      tags: [Board]
      summary: List projects
      description: Reads project board records that define the workspaces and repositories available to the operator UI.
      responses:
        '200':
          description: Project rows.
    post:
      tags: [Board]
      summary: Create a project
      description: Creates a project board record used to route tasks and workflow runs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Created project.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/projects/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      summary: Read a project
      description: Reads one project board record by id.
      responses:
        '200':
          description: Project row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Board]
      summary: Update a project
      description: Updates mutable project routing and display fields for a board record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateRequest'
      responses:
        '200':
          description: Updated project.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Board]
      summary: Delete a project
      description: Deletes a project board record by id when it is no longer available to operators.
      responses:
        '200':
          description: Deleted project.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/github/connection:
    get:
      tags: [GitHub]
      summary: Read GitHub connection status
      description: Reports whether GitHub OAuth is configured and whether a local account is currently connected.
      responses:
        '200':
          description: GitHub OAuth connection state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubConnectionResponse'
    delete:
      tags: [GitHub]
      summary: Disconnect GitHub
      description: Clears the locally stored GitHub OAuth connection and returns the updated connection state.
      responses:
        '200':
          description: Cleared local GitHub OAuth connection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubConnectionResponse'
  /api/github/oauth/start:
    get:
      tags: [GitHub]
      summary: Start GitHub OAuth
      description: Redirects the browser to GitHub OAuth when OAuth credentials are configured.
      parameters:
        - in: query
          name: returnTo
          required: false
          schema:
            type: string
            minLength: 1
        - in: query
          name: origin
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        '302':
          description: Redirects to GitHub OAuth authorization.
        '503':
          description: GitHub OAuth is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubConnectionResponse'
  /api/github/oauth/callback:
    get:
      tags: [GitHub]
      summary: Complete GitHub OAuth
      description: Handles GitHub OAuth callback parameters and redirects the operator back into the app.
      parameters:
        - in: query
          name: code
          required: false
          schema:
            type: string
            minLength: 1
        - in: query
          name: state
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        '302':
          description: Redirects to Projects after the OAuth callback.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/github/device/start:
    post:
      tags: [GitHub]
      summary: Start GitHub device flow
      description: Starts a GitHub device authorization flow for local environments where browser OAuth is not preferred.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GitHubDeviceStartRequest'
      responses:
        '200':
          description: GitHub device flow code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubDeviceStartResponse'
        '400':
          $ref: '#/components/responses/TypedError'
  /api/github/device/poll:
    post:
      tags: [GitHub]
      summary: Poll GitHub device flow
      description: Checks whether the active GitHub device authorization flow has completed.
      responses:
        '200':
          description: GitHub device authorization status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubDevicePollResponse'
        '400':
          $ref: '#/components/responses/TypedError'
  /api/github/repositories:
    get:
      tags: [GitHub]
      summary: List connected GitHub repositories
      description: Lists repositories available to the currently connected GitHub account.
      responses:
        '200':
          description: GitHub repositories available to the connected account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubRepositoriesResponse'
  /api/workspace/current:
    get:
      tags: [Workspace]
      summary: Read current workspace
      description: Returns the workspace identity resolved by server startup configuration.
      responses:
        '200':
          description: Current configured workspace identity.
  /api/chat/sessions:
    get:
      tags: [Chat]
      summary: List chat sessions
      description: Lists chat sessions, optionally scoped to a workspace id.
      parameters:
        - in: query
          name: workspaceId
          required: false
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Chat sessions for the workspace.
    post:
      tags: [Chat]
      summary: Create a chat session
      description: Creates a chat session that can collect operator messages and queue workflow actions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSessionCreateRequest'
      responses:
        '201':
          description: Created chat session.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/chat/sessions/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Chat]
      summary: Update a chat session
      description: Updates chat session metadata such as title, archived state, project binding, and pending request fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSessionUpdateRequest'
      responses:
        '200':
          description: Updated chat session.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Chat]
      summary: Archive a chat session
      description: Archives a chat session by id without deleting its persisted conversation records.
      responses:
        '200':
          description: Archived chat session.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/chat/sessions/{id}/status:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Chat]
      summary: Read chat session status
      description: Reads current runtime state for a chat session, including pending workflow activity when present.
      responses:
        '200':
          description: Current chat session runtime and workflow status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSessionStatusResponse'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/chat/sessions/{id}/messages:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Chat]
      summary: List chat messages
      description: Lists persisted messages for a chat session in display order.
      responses:
        '200':
          description: Chat session messages.
        '404':
          $ref: '#/components/responses/TypedError'
    post:
      tags: [Chat]
      summary: Append a chat message
      description: Adds a message to a chat session without directly sending it to the workflow worker.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageCreateRequest'
      responses:
        '201':
          description: Appended chat message.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/chat/sessions/{id}/send:
    parameters:
      - $ref: '#/components/parameters/Id'
    post:
      tags: [Chat]
      summary: Send a chat workflow request
      description: Queues a chat request for the workflow worker and returns the accepted send status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSendMessageRequest'
      responses:
        '200':
          description: Chat send result.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/tasks:
    get:
      tags: [Board]
      summary: List tasks
      description: Reads task board records used by the operator UI.
      responses:
        '200':
          description: Task rows.
    post:
      tags: [Board]
      summary: Create a task
      description: Creates a task board record that can later be routed into a workflow run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Created task.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/tasks/chat-create:
    post:
      tags: [Board]
      summary: Create a task from chat
      description: Converts a chat task creation request into structured task fields and clarification questions when needed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskChatCreateRequest'
      responses:
        '200':
          description: Structured chat task creation result.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      summary: Read a task
      description: Reads one task board record by id.
      responses:
        '200':
          description: Task row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Board]
      summary: Update a task
      description: Updates mutable task board fields such as status, title, project, assignee, and workflow metadata.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: Updated task.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Board]
      summary: Delete a task
      description: Deletes one task board record by id.
      responses:
        '200':
          description: Deleted task.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/tasks/{id}/activity:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Board]
      summary: Read task activity
      description: Reads the activity timeline associated with a task board record.
      responses:
        '200':
          description: Task activity timeline.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/agents:
    get:
      tags: [Read Models]
      summary: List agent records
      description: Reads configured agent rows used by dashboards and agent selection views.
      responses:
        '200':
          description: Agent rows.
    post:
      tags: [Read Models]
      summary: Create an agent record
      description: Creates an agent row for local read-model configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateRequest'
      responses:
        '201':
          description: Created agent.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/agents/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Read Models]
      summary: Read an agent record
      description: Reads one configured agent row by id.
      responses:
        '200':
          description: Agent row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Read Models]
      summary: Update an agent record
      description: Updates mutable agent metadata, model settings, status, skills, and instructions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateRequest'
      responses:
        '200':
          description: Updated agent.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Read Models]
      summary: Delete an agent record
      description: Deletes one configured agent row by id.
      responses:
        '204':
          description: Deleted agent.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/skills:
    get:
      tags: [Read Models]
      summary: List skill records
      description: Reads skill rows used by the operator UI and agent configuration surfaces.
      responses:
        '200':
          description: Skill rows.
    post:
      tags: [Read Models]
      summary: Create a skill record
      description: Creates a skill row with source metadata for local operator views.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateRequest'
      responses:
        '201':
          description: Created skill.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/skills/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Read Models]
      summary: Read a skill record
      description: Reads one skill row by id.
      responses:
        '200':
          description: Skill row.
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Read Models]
      summary: Update a skill record
      description: Updates mutable skill metadata and source content.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillUpdateRequest'
      responses:
        '200':
          description: Updated skill.
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
    delete:
      tags: [Read Models]
      summary: Delete a skill record
      description: Deletes one skill row by id.
      responses:
        '204':
          description: Deleted skill.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/command-history:
    get:
      tags: [Read Models]
      summary: List command history records
      description: Reads persisted command history records for operator history views.
      responses:
        '200':
          description: Command history rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommandHistoryRecord'
  /api/project-boards:
    get:
      tags: [Read Models]
      summary: Read project board records
      description: Reads project board records used to assemble board views.
      responses:
        '200':
          description: Project board rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectBoardRecord'
  /api/board-projects:
    get:
      tags: [Read Models]
      summary: Read board project records
      description: Reads board project rows for project-oriented dashboard views.
      responses:
        '200':
          description: Board project rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardProjectRecord'
  /api/board-tasks:
    get:
      tags: [Read Models]
      summary: Read board task records
      description: Reads board task rows for task lists and board columns.
      responses:
        '200':
          description: Board task rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardTaskRecord'
  /api/polling/status:
    get:
      tags: [Polling]
      summary: Read polling health and recent operational events
      description: Returns poller status rows and recent events so operators can see whether background task intake is active.
      responses:
        '200':
          description: Poller status rows and recent event rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollingStatusResponse'
  /api/settings/models:
    get:
      tags: [Settings]
      summary: Read workflow model and reasoning settings
      description: Reads per-stage model and reasoning-effort settings plus available options.
      responses:
        '200':
          description: Workflow model settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsModelsResponse'
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Settings]
      summary: Update workflow model and reasoning settings
      description: Updates model and reasoning-effort selections for one or more workflow stages.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsModelsUpdateRequest'
      responses:
        '200':
          description: Updated workflow model settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsModelsResponse'
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/settings/github:
    get:
      tags: [Settings]
      summary: Read GitHub commit and PR instructions
      description: Reads operator-authored instructions used when workflows prepare commits and pull request context.
      responses:
        '200':
          description: GitHub workflow instructions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsGithubResponse'
        '404':
          $ref: '#/components/responses/TypedError'
    patch:
      tags: [Settings]
      summary: Update GitHub commit and PR instructions
      description: Updates commit and pull request instruction text used by workflow runs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsGithubUpdateRequest'
      responses:
        '200':
          description: Updated GitHub workflow instructions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsGithubResponse'
        '400':
          $ref: '#/components/responses/TypedError'
        '404':
          $ref: '#/components/responses/TypedError'
  /api/workspaces/{workspaceId}/projects:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      tags: [Board]
      summary: List workspace projects
      description: Lists projects associated with a workspace for board navigation.
      responses:
        '200':
          description: Workspace project list.
  /api/workspaces/{workspaceId}/projects/{projectId}/board:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Board]
      summary: Read a workspace project board
      description: Reads board columns and tasks for a project within a workspace.
      responses:
        '200':
          description: Workspace project board.
        '404':
          $ref: '#/components/responses/TypedError'
  /api/inbox/messages:
    get:
      tags: [Read Models]
      summary: List inbox messages
      description: Reads inbox messages scoped to a workspace, user, and workflow run.
      parameters:
        - in: query
          name: workspaceId
          required: true
          schema:
            type: string
            minLength: 1
        - in: query
          name: userId
          required: true
          schema:
            type: string
            minLength: 1
        - in: query
          name: runId
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Inbox messages scoped by workspace, user, and run.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InboxMessageRecord'
        '400':
          $ref: '#/components/responses/TypedError'
    post:
      tags: [Read Models]
      summary: Create an inbox message
      description: Creates an inbox message for a workspace/user/run context.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboxMessageCreateRequest'
      responses:
        '201':
          description: Created inbox message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxMessageRecord'
        '400':
          $ref: '#/components/responses/TypedError'
  /api/notifications:
    post:
      tags: [Notifications]
      summary: Send an internal notification
      description: Accepts an internal notification request from workflow or operator actions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Notification accepted.
        '400':
          $ref: '#/components/responses/TypedError'
  /api/notifications/email:
    post:
      tags: [Notifications]
      summary: Send an email notification
      description: Sends an email notification when email delivery is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Notification sent.
        '400':
          $ref: '#/components/responses/TypedError'
components:
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
        minLength: 1
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        type: string
        minLength: 1
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    TypedError:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TypedError'
  schemas:
    ApiDocsResponse:
      type: object
      description: Generated route documentation returned for API reference and operator docs surfaces.
      additionalProperties: false
      required: [routes]
