        routes:
          type: array
          items:
            $ref: '#/components/schemas/ApiRouteDoc'
    ApiRouteDoc:
      type: object
      description: One implemented server route as exposed by the generated route-doc endpoint.
      additionalProperties: false
      required: [group, method, path, response, summary]
      properties:
        group: { type: string, minLength: 1 }
        method:
          type: string
          enum: [DELETE, GET, PATCH, POST]
        path: { type: string, minLength: 1 }
        response: { type: string, minLength: 1 }
        summary: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        pathParams:
          type: array
          items:
            type: string
            minLength: 1
        queryParams:
          type: array
          items:
            type: string
            minLength: 1
        requestBody:
          type: string
          minLength: 1
    TypedError:
      type: object
      description: Standard JSON error envelope returned for validation, lookup, and integration failures.
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
    AgentCreateRequest:
      type: object
      description: Agent read-model payload used to create a locally configured agent row.
      additionalProperties: false
      required: [id, name, backend, model, createdAt]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        backend: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        reasoningEffort:
          type: string
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SettingsReasoningEffort'
        createdAt: { type: string, minLength: 1 }
    AgentUpdateRequest:
      description: Partial update payload for a configured agent row.
      allOf:
        - $ref: '#/components/schemas/AgentPatchFields'
        - minProperties: 1
    AgentPatchFields:
      type: object
      additionalProperties: false
      properties:
