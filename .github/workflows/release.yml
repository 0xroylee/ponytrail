name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.7.0
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(bun -e "console.log(require('./packages/cli/package.json').version)")"

          if [[ "${tag_version}" != "${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match packages/cli version ${package_version}."
            exit 1
          fi

      - name: Verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "NPM_TOKEN secret is required for release dry-run authentication."
            exit 1
          fi

      - name: Configure npm auth for Bun
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          {
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=true"
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}"
          } > "${HOME}/.npmrc"

      - name: Run CLI release gate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          bun run release:cli

      - name: Pack CLI tarball
        run: |
          mkdir -p dist-release
          cd packages/cli
          bun pm pack --ignore-scripts
          mv "devos-${GITHUB_REF_NAME#v}.tgz" "../../dist-release/devos-${GITHUB_REF_NAME#v}.tgz"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="dist-release/devos-${GITHUB_REF_NAME#v}.tgz"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "devos ${GITHUB_REF_NAME}" \
              --notes "Release ${GITHUB_REF_NAME}"
            gh release upload "${GITHUB_REF_NAME}" "${asset}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "${asset}" \
              --title "devos ${GITHUB_REF_NAME}" \
              --notes "Release ${GITHUB_REF_NAME}" \
              --verify-tag
          fi
